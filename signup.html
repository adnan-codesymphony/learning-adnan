<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="signup.css"/>
</head>
  

<body>



    <div class="main">

    
    <div class="container">
        
        
             <h1>Sign Up</h1>
           

            <form  name="myForm" id="thisform">
                     <div class="input-group">
                        <input type="text" name="fname" id="fname_id"/>
                        <label>Firstname</label>
                    </div>

                    <div class="input-group">
                        <input type="text" name="lname"/>
                        <label>Lastname</label>
                    </div>

                    <div class="input-group">
                        <input type="email" name="email"/>
                        <label>Email</label>
                    </div>

                    <div class="input-group">
                        <input type="number" name="mobile"/>
                        <label>Mobile No.</label>
                    </div>

                    <div class="input-group">
                        <input type="password" name="password"/>
                        <label>Password</label>
                    </div>

                   <input type="submit" value="Submit" onclick="showData()" />
            </form>  

            </div>


            <table cellspacing="15">
                <tr>
                    <th>Field</th>
                    <th>Value</th>
                </tr>
                <tr>
                    <td>Firstname</td>
                    <td id="table_fname"></td>
                </tr>
                 <tr>
                    <td>Lastname</td>
                    <td id="table_lname"></td>
                </tr>
                 <tr>
                    <td>Email</td>
                    <td id="table_email"></td>
                </tr>
                 <tr>
                    <td>Mobile No.</td>
                    <td id="table_mobile"></td>
                </tr>
                 <tr>
                    <td>Password</td>
                    <td id="table_password"></td>
                </tr>
            </table>
        
    </div>




      <script >
        function showData() 
        {
                const fname_id = document.getElementById("fname_id");
                const thisform = document.getElementById("thisform");
                thisform.addEventListener('submit',function(event) {
                    
                    event.preventDefault();
                });

             
                var fname = document.forms["myForm"]["fname"].value;
                var lname = document.forms["myForm"]["lname"].value;
                var email = document.forms["myForm"]["email"].value;
                var mobile = document.forms["myForm"]["mobile"].value;
                var password = document.forms["myForm"]["password"].value;
                
                
                console.log("Firstname: "+fname+"\nLastname : "+lname+"\nEmail : "+email+"\nMobile No. : "+mobile+"\nPassword : "+password);
                
                const table_fname = document.getElementById("table_fname").innerHTML=fname;
                const table_lname = document.getElementById("table_lname").innerHTML=lname;
                const table_email = document.getElementById("table_email").innerHTML=email;
                const table_mobile = document.getElementById("table_mobile").innerHTML=mobile;
                const table_password = document.getElementById("table_password").innerHTML=password;



                thisform.reset();
                fname_id.focus();
                
                
        }
        
    </script>
    
</body>
</html>
