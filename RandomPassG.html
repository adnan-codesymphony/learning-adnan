<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <style>
        *{
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <button id="genPass">Generate Password</button><br><br>
    <span id="show"></span>

    <script>

        const genPass = document.getElementById("genPass");
        const show = document.getElementById("show");

        genPass.addEventListener('click', function () {

            var txt = "";
            let pass;

            for(let i=1; i<=10; i++)
            {
                pass = Math.floor(Math.random()*126);
                txt += String.fromCharCode(checkPass(pass));
            }
     
            show.innerHTML = txt;

        });


        function checkPass(p)
        {
            
             while(p<33)
             {
                        p = Math.floor(Math.random()*126);

                        if(p>32)
                        {
                            break;
                        }
             } 

             return p;
        }   
    </script>
    
</body>
</html>
