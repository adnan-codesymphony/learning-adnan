<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <script>

        //for of loop is used to iterate Strings, Arrays

        
        let str = "JavaScript"
        
        for(let i of str)
        {
            console.log("i : "+i);
        }


        //for in loop is used to iterate Objects, Arrays

        let person = {

            name : "Amit",
            age : 21,

        };
        
        for(let key in person)
        {
            console.log("Key : "+key+" Value : "+person[key]);
        }


       

    </script>

</body>
</html>
