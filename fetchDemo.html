// -------------------------- fetch() get request -----------------------------

         
        async function getData()
        {
            try
            {
                let response = await fetch(url);

                if (!response.ok) 
                {
                    throw new Error(`HTTP Error , Status : ${response.status}`);
                }

                let data = await response.json();
                console.log(data);

            } catch (error) 
            {
                console.log(error);
            }
            
            
            

        }

        getData();
