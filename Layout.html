<!DOCTYPE html>
<html lang="en">
<head>
       <title>Layout</title>
       <link rel='stylesheet'  href='Layout.css'> 
</head>
<body>
    
  
    <div class="nav">
        <a href="Home.html" target="iframe">Home</a>
        <a href="Contact.html" target="iframe">Contact</a>
        <a href="About.html" target="iframe">About</a>
        <a href="table.html" target="iframe">Projects</a>
        <a href="HtmlTags.html" target="iframe">FiveHtmlTags</a>
    </div>

    <div class="imgdiv">
    </div>

    <div class="btnDiv">
        <button id="btnDisplay">Display Items</button>
        <p>Click the button given in left side to display the items in the Table. </p>

    </div>

    <div class="tableDiv">

        <table cellspacing="50" id="tableDiv">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Name</th>
                    <th>Image</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody id="tableBody">
                
            </tbody>
        </table>
    </div>


    <script>

       /*  const items = [ 
        [1,"Wheat","wheat.jpg",1,22,22],
        [2,"Rice","rice_new.jpg",1,30,30],
        [3,"Dove","dove_new.jpg",1,43,43],
        [4,"Lux","lux.jpg",1,30,30]
    ]; */


        const items = [

            {
                no : 1,
                name : "Wheat",
                image : "wheat.jpg",
                qty : 1,
                price : 22,
                total : 22
            },

            {
                no : 2,
                name : "Rice",
                image : "rice_new.jpg",
                qty : 1,
                price : 30,
                total : 30
            },

            {
                no : 3,
                name : "Dove",
                image : "dove_new.jpg",
                qty : 1,
                price : 43,
                total : 43
            },

            {
                no : 4,
                name : "Lux",
                image : "lux.jpg",
                qty : 1,
                price : 30,
                total : 30
            }


        ]
             
        

        const btnDisplay = document.getElementById("btnDisplay");
        const tableBody = document.getElementById("tableBody");
        const tableDiv = document.getElementById("tableDiv");

        

        btnDisplay.addEventListener('click', function(){

            tableDiv.style.display = "block";
            
            let txt = "";
           
            items.map((items,index)=>{

                   
                         txt += `<tr>
                            <td id="id">${items.no}</td>
                            <td>${items.name}</td>
                            <td><img src='${items.image}' style="height:100px; width:100px;"/></td>
                            <td>
                                <button id="btnMinus" style="background-color:red; color:white; border-radius:50%; font-size:20px; padding: 0px 7px 0px 7px">-</button>
                                <span id="qty">${items.qty}</span>
                                <button id="btnPlus" style="background-color:green; color:white; border-radius:50%; font-size:20px;">+</button>
                            </td>
                            <td>
                                <span id="price">${items.price}</span>
                            </td>
                            <td>
                                <span id="total">${items.total}</span>
                            </td>

                            </tr>`;
                          
            });

           
            
            tableBody.innerHTML = txt;

            const btnMinus = document.getElementById("btnMinus");
            const btnPlus = document.getElementById("btnPlus");
            const qty = document.getElementById("qty");
            const price = document.getElementById("price");
            const total = document.getElementById("total");
            const id = document.getElementById("id");


            btnMinus.addEventListener('click', function () {

                if(qty.innerText > 1)
                {
                    qty.innerHTML = parseInt(qty.innerText) - 1;
                    total.innerHTML = price.innerText * qty.innerText;  
                }               
               
            });

            btnPlus.addEventListener('click', function () {

                qty.innerHTML = parseInt(qty.innerText) + 1;
                total.innerHTML = price.innerText * qty.innerText;
            });
           


        });

    </script>
</body>
</html>
