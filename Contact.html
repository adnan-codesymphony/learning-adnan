<!DOCTYPE html>
<html lang="en">

<head>
    <title>Contact Page</title>
    <!-- <link rel='stylesheet'  href='style.css'> -->
</head>

<body>


    <center>
        <form>
        <table border="1" cellpadding="10">
            <tr>
                <th>Label</th>
                <th>Tags</th>
            </tr>

            <tr>
                <td>Enter Firstname</td>
                <td>
                    <input type="text" name="fname" />
                </td>
            </tr>

            <tr>
                <td>Enter Lastname</td>
                <td>
                    <input type="text" name="lname" />
                </td>
            </tr>


            <tr>
                <td>Enter Email</td>
                <td>
                    <input type="email" name="email" />
                </td>
            </tr>

            <tr>
                <td>Enter Mobile No.</td>
                <td>
                    <input type="number" name="mobile" />
                </td>
            </tr>


            <tr>
                <td>Enter Password</td>
                <td>
                    <input type="password" name="password" />
                </td>
            </tr>

            <tr>
                <td>Select Gender</td>
                <td>
                    <input type="radio" name="gender" />Male
                    <input type="radio" name="gender" />Female
                </td>
            </tr>

            <tr>
                <td>Select Hobbies</td>
                <td>
                    <input type="checkbox" name="Travelling" />Travelling
                    <input type="checkbox" name="Reading" />Reading
                    <input type="checkbox" name="Writing" />Writing
                </td>
            </tr>

            <tr>
                <td>Select Date of Birth</td>
                <td>
                    <input type="date" name="dob" />
                </td>
            </tr>

            <tr>
                <td>Select City</td>
                <td>
                    <select>
                        <option>Jamnagar</option>
                        <option>Ahmedabad</option>
                        <option>Surat</option>
                        <option>Rajkot</option>
                        <option>Baroda</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Address</td>
                <td>            
                        <textarea name="address" rows="10" cols="30">

                         </textarea>
                </td>
            </tr>

             <tr>
                <td>Image</td>
                <td>            
                     <input type="file" name="image" accept="image/gif, image/jpeg, image/png"/>
                     
                </td>
            </tr>

            <tr>
                <td></td>
                <td>            
                     <input type="submit" name="Submit" />
                     <input type="reset" name="Reset" />
                </td>
            </tr>


        </table>

        </form>
    </center>

</body>

</html>
